{% load static %}
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio Profesional de Jordi Martin - Junior Software Developer especializado en Java, Linux y Ciberseguridad.">
    <title>Jordi Martin | Portfolio Profesional</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=6.0">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="#inicio" class="logo">JM<span>.</span></a>
            
            <button class="menu-toggle" aria-label="Abrir menú" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            
            <nav class="nav-links" id="nav-links">
                <a href="#inicio" class="nav-link nav-link-inicio"><i class="fas fa-home nav-icon"></i> <span>Inicio</span></a>
                <a href="#sobre-mi" class="nav-link nav-link-sobre-mi"><i class="fas fa-user nav-icon"></i> <span>Sobre mí</span></a>
                <a href="#tecnologias" class="nav-link nav-link-tecnologias"><i class="fas fa-code nav-icon"></i> <span>Tecnologías</span></a>
                <a href="#proyectos" class="nav-link nav-link-proyectos"><i class="fas fa-cubes nav-icon"></i> <span>Proyectos</span></a>
                <a href="#laboratorio" class="nav-link nav-link-laboratorio"><i class="fas fa-flask nav-icon"></i> <span>Laboratorio</span></a>
                <a href="#certificados" class="nav-link nav-link-certificados"><i class="fas fa-certificate nav-icon"></i> <span>Certificados</span></a>
                <a href="#experiencia" class="nav-link nav-link-experiencia"><i class="fas fa-briefcase nav-icon"></i> <span>Experiencia</span></a>
                <a href="#youtube" class="nav-link nav-link-youtube"><i class="fab fa-youtube nav-icon"></i> <span>YouTube</span></a>
                <a href="#contacto" class="nav-link nav-link-contacto"><i class="fas fa-envelope nav-icon"></i> <span>Contacto</span></a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; {% now "Y" %} Jordi Martin. Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="https://github.com/tu-usuario" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com/in/tu-perfil" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="mailto:tuemail@ejemplo.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
